<!-- ==================== HERO ==================== -->
<section class="hero hero--sales" aria-label="כותרת ראשית" style="overflow:hidden;">
  <div class="container">
    <div class="row justify-content-center text-center">
      <div class="col-lg-8">
        <h1 class="hero-title mb-3">תפסו את הרב 📲</h1>
      </div>
    </div>

    <div id="rabbi-runner" style="position:relative; height:120px; width:100%;" aria-hidden="true">
      <span style="position:absolute; right:0; top:50%; transform:translateY(-50%); font-size:2.8rem; line-height:1;" aria-hidden="true">🕍</span>
      <span style="position:absolute; left:0; top:50%; transform:translateY(-50%); font-size:2.8rem; line-height:1;" aria-hidden="true">🏠</span>
      <div id="rabbi" style="position:absolute; top:50%; transform:translateY(-50%); cursor:pointer; user-select:none; left:50%;"
           role="button" aria-label="לחצו לתפוס את הרב" tabindex="0">
        <img src="img/rabbi-run.png" alt="" id="rabbi-img" style="height:50px; display:block; transform:scaleX(-1);" aria-hidden="true" />
      </div>
    </div>

    <div class="row justify-content-center text-center mt-2">
      <div class="col-lg-8">
        <p id="catch-msg" style="color:#ffffff; font-size:1.1rem; min-height:1.8rem; font-weight:600;" aria-live="polite"></p>
      </div>
    </div>

  </div>
</section>

<script>
  const rabbi = document.getElementById('rabbi');
  const rabbiImg = document.getElementById('rabbi-img');
  const track = document.getElementById('rabbi-runner');
  const msg = document.getElementById('catch-msg');

  let pos = 50;
  let direction = 1;
  let speed = 0.35;
  let caught = false;
  let animFrame;

  function animate() {
    if (caught) return;
    pos += direction * speed;
    const maxPos = 88;
    const minPos = 8;
    if (pos >= maxPos) {
      pos = maxPos;
      direction = -1;
      rabbiImg.style.transform = 'scaleX(1)';
    }
    if (pos <= minPos) {
      pos = minPos;
      direction = 1;
      rabbiImg.style.transform = 'scaleX(-1)';
    }
    rabbi.style.left = pos + '%';
    animFrame = requestAnimationFrame(animate);
  }

  animate();

  function catchRabbi() {
    if (caught) return;
    caught = true;
    cancelAnimationFrame(animFrame);
    rabbiImg.style.transform = 'scaleX(1)';
    msg.textContent = 'תפסתם אותי! עכשיו אני מקשיב';
    setTimeout(() => {
      document.querySelector('.contact-form').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 900);
  }

  rabbi.addEventListener('mouseenter', catchRabbi);
  rabbi.addEventListener('touchstart', catchRabbi, { passive: true });
  rabbi.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') catchRabbi(); });
</script>


<!-- ==================== CONTACT FORM ==================== -->
<section class="section" aria-labelledby="contact-title">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-7">

        <form class="contact-form" novalidate aria-label="טופס יצירת קשר">

          <div class="mb-3">
            <label for="cf-name" class="form-label">שם מלא</label>
            <input type="text" class="form-control" id="cf-name"
              placeholder="השם שלכם" required
              autocomplete="name" />
          </div>

          <div class="mb-3">
            <label for="cf-phone" class="form-label">טלפון</label>
            <input type="tel" class="form-control" id="cf-phone"
              placeholder="05x-xxxxxxx" required
              autocomplete="tel" inputmode="tel" />
          </div>

          <div class="mb-4">
            <label for="cf-msg" class="form-label">במה אפשר לעזור?</label>
            <textarea class="form-control" id="cf-msg" rows="4" placeholder="ספרו לי קצת..."></textarea>
          </div>

          <div class="contact-actions d-flex flex-column flex-sm-row gap-3">
            <button type="button" class="btn btn-success btn-lg flex-fill" id="sendWhatsappBtn">
              💬 שלחו בווצאפ
            </button>
            <button type="button" class="btn btn-cta btn-lg flex-fill" id="sendEmailBtn">
              ✉️ שלחו במייל
            </button>
            <a href="https://calendly.com/rabbiyos/talk1hr" target="_blank" rel="noopener noreferrer"
               class="btn btn-cta btn-lg flex-fill">
              📅 תיאום שיחה
            </a>
          </div>

        </form>

      </div>
    </div>
  </div>
</section>

<!-- JS -->
<script src="js/layout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function getFormData() {
    return {
      name: document.getElementById('cf-name')?.value.trim() || '',
      phone: document.getElementById('cf-phone')?.value.trim() || '',
      message: document.getElementById('cf-msg')?.value.trim() || ''
    };
  }

  function validateForm(data) {
    if (!data.name) { alert('אנא מלאו שם.'); return false; }
    if (!data.phone) { alert('אנא מלאו טלפון.'); return false; }
    return true;
  }

  function buildMessage(data) {
    return `שלום יוסף,\n\nשם: ${data.name}\nטלפון: ${data.phone}\nהודעה: ${data.message || '-'}`;
  }

  document.getElementById('sendWhatsappBtn').addEventListener('click', function () {
    const data = getFormData();
    if (!validateForm(data)) return;
    const text = encodeURIComponent(buildMessage(data));
    window.open(`https://wa.me/972544970054?text=${text}`, '_blank', 'noopener,noreferrer');
  });

  document.getElementById('sendEmailBtn').addEventListener('click', function () {
    const data = getFormData();
    if (!validateForm(data)) return;
    const subject = encodeURIComponent(`פנייה מהאתר – ${data.name}`);
    const body = encodeURIComponent(buildMessage(data));
    window.location.href = `mailto:terzis@gmail.com?subject=${subject}&body=${body}`;
  });
</script>
